<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h1{
    margin-bottom:30px;
}

input,select{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
}

.card{
    background:#f9fafb;
    padding:20px;
    border-radius:15px;
    margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>👤 User Profile</h1>

<form method="POST">

<input
type="number"
name="age"
placeholder="Age"
required
>

<select name="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input
type="number"
step="0.1"
name="weight"
placeholder="Weight (kg)"
required
>

<input
type="number"
step="0.1"
name="height"
placeholder="Height (cm)"
required
>

<button type="submit">
Save Profile
</button>

</form>

{% if profile %}

<div class="card">

<h2>Saved Profile</h2>

<p>
<b>Age:</b>
{{ profile.age }}
</p>

<p>
<b>Gender:</b>
{{ profile.gender }}
</p>

<p>
<b>Weight:</b>
{{ profile.weight }} kg
</p>

<p>
<b>Height:</b>
{{ profile.height }} cm
</p>

<p>
<b>BMI:</b>
{{ bmi }}
</p>

</div>

{% endif %}

</div>

</body>
</html>
