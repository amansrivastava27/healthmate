<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health AI Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f4f7fb;
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    font-size:24px;
    font-weight:600;
}

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    max-width:70%;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.input-area{
    display:flex;
    padding:20px;
    background:white;
    border-top:1px solid #ddd;
}

.input-area input{
    flex:1;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
}

.input-area button{
    margin-left:10px;
    background:#16a34a;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
💬 Health AI Assistant
</div>

<div class="chat-container" id="chatContainer">

<div class="message bot">
Hello 👋<br><br>
I am your AI health assistant.
</div>

</div>

<div class="input-area">

<input type="text" id="messageInput" placeholder="Ask health question...">

<button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage(){

    let input = document.getElementById("messageInput");

    let message = input.value.trim();

    if(!message) return;

    let chat = document.getElementById("chatContainer");

    chat.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    })

    .then(res => res.json())

    .then(data => {

        chat.innerHTML += `
            <div class="message bot">
                ${data.reply}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;
    });

    input.value = "";
}

</script>

</body>
</html>
