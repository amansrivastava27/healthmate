<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:#f4f7fb;
    padding:40px;
}

h1{
    margin-bottom:30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
    text-align:center;
}

.card img{
    width:100px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

.card button{
    margin-top:15px;
    padding:10px 18px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>💊 Digital Pharmacy</h1>

<div class="products">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png">
<h3>Vitamin B12</h3>
<p>Supports energy and nerve health</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png">
<h3>Vitamin D</h3>
<p>Supports bones and immunity</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png">
<h3>Diabetes Care</h3>
<p>Glucose monitor and strips</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
